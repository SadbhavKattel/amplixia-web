<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 100" role="img" aria-label="amplixia">
  <defs>
    <linearGradient id="amplixia-x-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2e5bff" />
      <stop offset="55%" stop-color="#4a6cff" />
      <stop offset="100%" stop-color="#8a2be2" />
    </linearGradient>
  </defs>
  <!-- "ampli" -->
  <text
    x="0"
    y="75"
    font-family="'Manrope', 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-weight="700"
    font-size="84"
    letter-spacing="-3"
    fill="#ffffff"
  >ampli</text>
  <!-- Custom X: two crossing filled parallelograms. No strokes = no gap at intersection. -->
  <g transform="translate(214, 22)">
    <!-- Back stroke (top-left → bottom-right), slight opacity to suggest depth -->
    <path d="M 0 5 L 11 0 L 56 51 L 45 56 Z" fill="url(#amplixia-x-grad)" opacity="0.88" />
    <!-- Front stroke (top-right → bottom-left), drawn on top — no gap possible -->
    <path d="M 45 0 L 56 5 L 11 56 L 0 51 Z" fill="url(#amplixia-x-grad)" />
  </g>
  <!-- "ia" -->
  <text
    x="276"
    y="75"
    font-family="'Manrope', 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-weight="700"
    font-size="84"
    letter-spacing="-3"
    fill="#ffffff"
  >ia</text>
</svg>
